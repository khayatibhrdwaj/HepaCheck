<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ page_title or "HepaCheck" }}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --primary: #4f46e5;
  --secondary: #6366f1;
  --bg: #f8fafc;
  --card: #ffffff;
  --border: #e5e7eb;
  --text: #111827;
  --muted: #6b7280;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

/* Sidebar */
.sidebar {
  width: 240px;
  height: 100vh;
  position: fixed;
  background: white;
  border-right: 1px solid var(--border);
  padding: 20px;
}

.sidebar h4 {
  font-weight: 700;
  margin-bottom: 25px;
}

.sidebar a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  color: var(--muted);
  text-decoration: none;
  border-radius: 10px;
  margin-bottom: 5px;
  transition: 0.2s;
}

.sidebar a:hover {
  background: #eef2ff;
  color: var(--primary);
}

.sidebar a.active {
  background: var(--primary);
  color: white;
}

/* Content */
.content {
  margin-left: 260px;
  padding: 30px;
}

/* Cards */
.card {
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--card);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-2px);
}

/* KPI */
.kpi {
  padding: 20px;
}

.kpi h6 {
  color: var(--muted);
  font-size: 14px;
}

.kpi h3 {
  font-weight: 700;
}

/* Buttons */
.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border: none;
}

/* Inputs */
.form-control {
  border-radius: 10px;
  padding: 10px;
}

/* Page title */
.page-title {
  font-weight: 700;
  margin-bottom: 20px;
}

/* Chart box */
.chart-box {
  height: 300px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h4>HepaCheck</h4>
  {% block nav %}{% endblock %}
</div>

<div class="content">
  {% block content %}{% endblock %}
</div>

</body>
</html>
