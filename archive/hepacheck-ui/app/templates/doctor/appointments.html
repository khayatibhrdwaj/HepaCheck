{% extends "doctor/base_doctor.html" %}

{% block content %}

<h4>Appointments</h4>

<div class="row mb-4">
    {% for k,v in summary.items() %}
    <div class="col-md-3">
        <div class="card p-3 shadow-sm">
            <h6>{{ k.title() }}</h6>
            <h4>{{ v }}</h4>
        </div>
    </div>
    {% endfor %}
</div>

<table class="table table-hover bg-white shadow-sm">
    <thead>
        <tr>
            <th>Time</th>
            <th>Patient</th>
            <th>Purpose</th>
            <th>Status</th>
        </tr>
    </thead>

    <tbody>
        {% for a in appointments %}
        <tr>
            <td>{{ a.time }}</td>
            <td>{{ a.patient }}</td>
            <td>{{ a.purpose }}</td>
            <td>{{ a.status }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
