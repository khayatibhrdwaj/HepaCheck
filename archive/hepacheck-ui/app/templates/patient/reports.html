{% extends "patient/base_patient.html" %}

{% block content %}

<h4>Reports</h4>

<table class="table table-hover shadow-sm bg-white">
    <thead>
        <tr>
            <th>Date</th>
            <th>FIB-4</th>
            <th>APRI</th>
            <th>NFS</th>
            <th>HOMA-IR</th>
            <th>Risk</th>
        </tr>
    </thead>
    <tbody>
        {% for r in reports %}
        <tr>
            <td>{{ r.date }}</td>
            <td>{{ r.fib4_score }}</td>
            <td>{{ r.apri_score }}</td>
            <td>{{ r.nfs_score }}</td>
            <td>{{ r.homa_ir_score }}</td>
            <td>
                <span class="badge bg-danger">{{ r.fib4_risk }}</span>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
