{% extends "base.html" %}

{% block nav %}
<a href="/patient/home" class="active"><i class="bi bi-house"></i> Dashboard</a>
<a href="/patient/score"><i class="bi bi-calculator"></i> New Score</a>
{% endblock %}

{% block content %}

<h2 class="page-title">Patient Dashboard</h2>

<div class="row g-4">

<div class="col-md-4">
<div class="card kpi">
<h6>Latest FIB-4</h6>
<h3>{{ dashboard.fib4 or "-" }}</h3>
</div>
</div>

<div class="col-md-4">
<div class="card kpi">
<h6>Latest APRI</h6>
<h3>{{ dashboard.apri or "-" }}</h3>
</div>
</div>

<div class="col-md-4">
<div class="card kpi">
<h6>Risk Level</h6>
<h3>{{ dashboard.risk or "-" }}</h3>
</div>
</div>

</div>

<div class="card mt-4 p-4">
<h5>Trend</h5>
<div class="chart-box">
<canvas id="chart"></canvas>
</div>
</div>

<script>
const data = JSON.parse('{{ trend | tojson | safe }}');

new Chart(document.getElementById('chart'), {
  type: 'line',
  data: {
    labels: data.labels,
    datasets: [{
      label: "FIB-4",
      data: data.values,
      borderWidth: 2,
      tension: 0.4
    }]
  }
});
</script>

{% endblock %}
